name: Dira Dashboard
version: "0.8.3"
slug: dira_dashboard
description: Modern glassmorphism tablet dashboard for Home Assistant
url: https://github.com/DiraSmart/dira-tablet-dashboard

arch:
  - aarch64
  - amd64
  - armv7

init: false
startup: application

panel_icon: mdi:tablet-dashboard
panel_title: Dira
panel_admin: false

ingress: true
ingress_port: 3000
ingress_stream: true

ports:
  3000/tcp: null

map:
  - addon_config:rw

options:
  access_token: ""

schema:
  access_token: str
